<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Workout Routine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .error-card {
            background: #222;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #ff4444;
        }

        h1 {
            color: #ff4444;
        }
    </style>
</head>

<body>

    <div class="container" id="content">
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const token = getQueryParam('token');
        const contentDiv = document.getElementById('content');

        if (!token) {
            contentDiv.innerHTML = `<div class="error-card"><h1>Invalid Link</h1><p>This viewing token is missing or corrupted.</p></div>`;
        } else {
            try {
                // Decode the data back from Base64
                const data = JSON.parse(atob(token));
                const videoId = data.id;
                const expirationTime = data.exp;
                const currentTime = Date.now();

                // Check if current time has passed the expiration time
                if (currentTime > expirationTime) {
                    contentDiv.innerHTML = `
                        <div class="error-card">
                            <h1>Link Expired</h1>
                            <p>This workout video was valid for 24 hours and has now expired.</p>
                            <p>Please contact your trainer if you need an extension.</p>
                        </div>`;
                } else {
                    // Link is valid, load the video embed
                    contentDiv.innerHTML = `
                        <h2>Your Customized Workout Routine</h2>
                        <p>This link will expire 24 hours after it was generated.</p>
                        
                        <style>
                            /* Advanced trick to hide YouTube Share/Title and Logo without cropping the video itself */
                            .video-wrapper {
                                position: relative;
                                padding-bottom: 56.25%; /* Perfect 16:9 ratio */
                                height: 0;
                                overflow: hidden;
                                border-radius: 8px;
                                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
                                background: #000;
                                /* Add an invisible shield over the top and bottom to prevent stray clicks */
                            }
                            
                            /* We make the iframe taller than the container to force YouTube to add black bars. 
                               The Share button goes on the top black bar, which we then shift out of view! */
                            .video-wrapper iframe {
                                position: absolute;
                                top: -15%; /* Shift up to hide top UI */
                                left: 0;
                                width: 100%;
                                height: 130%; /* Increase height to push UI into black bars */
                                border: none;
                            }
                            
                            /* Invisible shields block hovering over the hidden UI areas */
                            .shield-top, .shield-bottom {
                                position: absolute;
                                left: 0;
                                width: 100%;
                                z-index: 10;
                                background: transparent;
                            }
                            .shield-top {
                                top: 0;
                                height: 15%;
                            }
                            .shield-bottom {
                                bottom: 0;
                                height: 15%;
                            }

                            /* Fullscreen Button Styles */
                            .fullscreen-btn {
                                position: absolute;
                                bottom: 15px;
                                right: 15px;
                                z-index: 20;
                                background: rgba(0,0,0,0.6);
                                color: white;
                                border: 1px solid rgba(255,255,255,0.3);
                                border-radius: 4px;
                                padding: 8px 12px;
                                font-size: 12px;
                                font-weight: bold;
                                cursor: pointer;
                                transition: background 0.2s;
                            }
                            .fullscreen-btn:hover {
                                background: rgba(0,0,0,0.9);
                            }
                            
                            /* Adjust wrapper when in fullscreen */
                            .video-wrapper:fullscreen {
                                padding-bottom: 0 !important;
                                height: 100vh !important;
                            }
                            .video-wrapper:-webkit-full-screen {
                                padding-bottom: 0 !important;
                                height: 100vh !important;
                            }
                        </style>

                        <div class="video-wrapper" id="vid-wrap">
                            <div class="shield-top"></div>
                            <iframe 
                                src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&controls=0&disablekb=1" 
                                sandbox="allow-scripts allow-same-origin allow-presentation"
                                allowfullscreen>
                            </iframe>
                            <div class="shield-bottom"></div>
                            <button class="fullscreen-btn" onclick="toggleFullScreen()">[ ] Full Screen</button>
                        </div>`;
                }

            } catch (e) {
                contentDiv.innerHTML = `<div class="error-card"><h1>Error</h1><p>Unable to process this link.</p></div>`;
            }
        }

        window.toggleFullScreen = function() {
            const wrapper = document.getElementById('vid-wrap');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) { /* Safari */
                    wrapper.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                }
            }
        };
    </script>
</body>

</html>
