<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Workout Routine</title>
    <!-- Include Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
        }

        /* 16:9 Aspect Ratio Container */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        /* Force Plyr to fill the container */
        .plyr--video {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* CROP HACK: Make the YouTube iframe taller and shift it up.
           This pushes the YouTube title/share bar and the YouTube bottom controls 
           outside of the visible area, perfectly hiding them without cropping the video itself. */
        .plyr__video-wrapper iframe {
            top: -60px !important;
            height: calc(100% + 120px) !important;
            pointer-events: none !important; /* Ensure iframe is unclickable */
        }

        .error-card {
            background: #222;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #ff4444;
        }

        h1 {
            color: #ff4444;
        }
    </style>
</head>

<body>

    <div class="container" id="content">
    </div>

    <!-- Include Plyr JS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const token = getQueryParam('token');
        const contentDiv = document.getElementById('content');

        if (!token) {
            contentDiv.innerHTML = `<div class="error-card"><h1>Invalid Link</h1><p>This viewing token is missing or corrupted.</p></div>`;
        } else {
            try {
                const data = JSON.parse(atob(token));
                const videoId = data.id;
                const expirationTime = data.exp;
                const currentTime = Date.now();

                if (currentTime > expirationTime) {
                    contentDiv.innerHTML = `
                        <div class="error-card">
                            <h1>Link Expired</h1>
                            <p>This workout video was valid for 24 hours and has now expired.</p>
                            <p>Please contact your trainer if you need an extension.</p>
                        </div>`;
                } else {
                    // Render the video player container for Plyr
                    contentDiv.innerHTML = `
                        <h2>Your Customized Workout Routine</h2>
                        <p>This link will expire 24 hours after it was generated.</p>
                        <div class="video-wrapper">
                            <div class="plyr__video-embed" id="player">
                                <iframe 
                                    src="https://www.youtube.com/embed/${videoId}?origin=${window.location.origin}&amp;iv_load_policy=3&amp;modestbranding=1&amp;playsinline=1&amp;rel=0&amp;enablejsapi=1" 
                                    allowfullscreen 
                                    allowtransparency 
                                    allow="autoplay">
                                </iframe>
                            </div>
                        </div>`;
                        
                    // Initialize Plyr custom video player
                    setTimeout(() => {
                        const player = new Plyr('#player', {
                            youtube: { noCookie: false, rel: 0, showinfo: 0, iv_load_policy: 3, modestbranding: 1 }
                        });
                    }, 50);
                }
            } catch (e) {
                contentDiv.innerHTML = `<div class="error-card"><h1>Error</h1><p>Unable to process this link.</p></div>`;
            }
        }
    </script>
</body>

</html>
