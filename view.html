<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Workout Routine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        /* Background Glows */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, rgba(0,0,0,0) 70%);
            top: -150px;
            left: -150px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow.right {
            top: auto;
            bottom: -200px;
            left: auto;
            right: -150px;
            background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, rgba(0,0,0,0) 70%);
        }

        .container {
            width: 90%;
            max-width: 800px;
            z-index: 10;
        }

        .premium-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { 
            margin-top: 0; 
            font-size: 28px; 
            font-weight: 600; 
            background: linear-gradient(to right, #818cf8, #f472b6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 25px; }

        .error-card {
            background: rgba(239, 68, 68, 0.1);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            backdrop-filter: blur(12px);
            animation: fadeIn 0.4s ease-out forwards;
        }

        h1.error-title { color: #f87171; margin-top: 0; font-size: 24px; }
        .error-card p { color: #f8fafc; }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow right"></div>

    <div class="container" id="content">
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const token = getQueryParam('token');
        const contentDiv = document.getElementById('content');

        if (!token) {
            contentDiv.innerHTML = `<div class="error-card"><h1 class="error-title">Invalid Link</h1><p>This viewing token is missing or corrupted.</p></div>`;
        } else {
            try {
                // Decode the data back from Base64
                const data = JSON.parse(atob(token));
                const videoId = data.id;
                const expirationTime = data.exp;
                const currentTime = Date.now();

                // Check if current time has passed the expiration time
                if (currentTime > expirationTime) {
                    contentDiv.innerHTML = `
                        <div class="error-card">
                            <h1 class="error-title">Link Expired</h1>
                            <p>This workout video was valid for 24 hours and has now expired.</p>
                            <p>Please contact your trainer if you need an extension.</p>
                        </div>`;
                    // Link is valid, load the video embed
                    contentDiv.innerHTML = `
                        <div class="premium-card">
                            <h2>Your Customized Workout Routine</h2>
                            <p class="subtitle">This link will expire 24 hours after it was generated.</p>
                            
                            <style>
                                /* We subtract exactly 60px from the 16:9 ratio to account for the cropped top */
                                .video-wrapper {
                                    position: relative;
                                    padding-bottom: calc(56.25% - 60px); 
                                    height: 0;
                                    overflow: hidden;
                                    border-radius: 12px;
                                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                                    background: #000;
                                }
                                
                                /* We add the 60px back to the iframe height. 
                                   This ensures the iframe is EXACTLY 16:9, so YouTube adds no black bars.
                                   By shifting it up 60px, the top Share/Title bar is perfectly hidden,
                                   and the bottom Control Bar aligns perfectly with the bottom of the wrapper! */
                                .video-wrapper iframe {
                                    position: absolute;
                                    top: -60px;
                                    left: 0;
                                    width: 100%;
                                    height: calc(100% + 60px);
                                    border: none;
                                }

                                /* Invisible shield to block clicking the YouTube watermark on the right side */
                                .watermark-shield {
                                    position: absolute;
                                    bottom: 45px; /* Just above the native control bar */
                                    right: 0;
                                    width: 120px;
                                    height: 50px;
                                    z-index: 10;
                                    background: transparent;
                                }
                            </style>

                            <div class="video-wrapper">
                                <div class="watermark-shield"></div>
                                <iframe 
                                    src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&playsinline=0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                                    allowfullscreen>
                                </iframe>
                            </div>
                        </div>`;
                }

            } catch (e) {
                contentDiv.innerHTML = `<div class="error-card"><h1 class="error-title">Error</h1><p>Unable to process this link.</p></div>`;
            }
        }
    </script>
</body>

</html>
